name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: shantanugarg2004
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  DOCKERHUB_REPO: munshi_dada
  PROJECT_PATH: /home/ubuntu/munshi-dada

jobs:
  migration-validation:
    name: Validate SQL Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: munshi
          POSTGRES_PASSWORD: munshi
          POSTGRES_DB: munshi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U munshi -d munshi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Apply migrations on fresh database
        env:
          POSTGRES_CONNECTION_STRING: postgresql://munshi:munshi@localhost:5432/munshi_test
        run: node scripts/apply-migrations.mjs

      - name: Verify migration status
        env:
          POSTGRES_CONNECTION_STRING: postgresql://munshi:munshi@localhost:5432/munshi_test
        run: node scripts/migration-status.mjs

  build-and-push:
    name: Build & Push Multi-Arch Docker Image
    runs-on: ubuntu-latest
    needs: migration-validation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest
          platforms: linux/amd64,linux/arm64

  deploy-on-ec2:
    name: Deploy on AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Connect to EC2, run migrations, restart stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: munshidev
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.PROJECT_PATH }}
            docker compose pull
            restart-docker-compose
