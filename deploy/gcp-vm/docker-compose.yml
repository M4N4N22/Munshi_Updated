# Production stack for munshi-prod (GCP VM).
# Path on VM: /home/ubuntu/munshi-dada
#
# Images (Docker Hub):
#   backend: shantanugarg2004/munshi_dada:latest
#   ml:      shantanugarg2004/munshi_dada-intent-extracter:latest

services:
  ml:
    image: shantanugarg2004/munshi_dada-intent-extracter:latest
    container_name: munshi-ml
    restart: unless-stopped
    env_file:
      - ml.env
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  backend:
    image: shantanugarg2004/munshi_dada:latest
    container_name: munshi-backend
    restart: unless-stopped
    ports:
      - '4001:4001'
    env_file:
      - .env
    environment:
      PORT: '4001'
      AUTO_MIGRATE: '1'
      NODE_ENV: production
      ML_URL: http://ml:8000
    depends_on:
      ml:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-qO-',
          'http://127.0.0.1:4001/health/migrations',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
